name = "hex-gram-schmidt-conformance"
defaultTargets = ["HexGramSchmidtConformance", "hexgramschmidt_emit_fixtures"]

[[require]]
name = "HexGramSchmidt"
path = ".."

[[require]]
name = "hex-test-kit"
git = "https://github.com/leanprover/hex-test-kit.git"
rev = "610207eec0ca214928eec42a6dd2084d859bf94d"

[[lean_lib]]
name = "HexGramSchmidtConformance"
globs = ["HexGramSchmidt.Conformance"]

[[lean_exe]]
name = "hexgramschmidt_emit_fixtures"
root = "HexGramSchmidt.EmitFixtures"
